<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameList — Seus Jogos Favoritos</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="tela-login">
    <div class="login-card">
      <div class="login-logo">
        <span class="pixel-icon">🕹️</span>
        <h1>GAME<span>LIST</span></h1>
        <p class="tagline">Seus jogos favoritos em um só lugar</p>
      </div>

      <div id="erro-login" class="mensagem-erro oculto"></div>

      <div class="campo">
        <label for="usuario">USUÁRIO</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="off" />
      </div>

      <div class="campo">
        <label for="senha">SENHA</label>
        <input type="password" id="senha" placeholder="Digite sua senha" />
      </div>

      <button id="btn-login">► ENTRAR</button>
    </div>
  </div>

  <!-- TELA DA LISTA -->
  <div id="tela-lista" class="oculto">

    <header>
      <div class="header-inner">
        <div class="header-logo">
          <span>🕹️</span>
          <span>GAME<strong>LIST</strong></span>
        </div>
        <button id="btn-logout">✕ SAIR</button>
      </div>
    </header>

    <main>
      <section class="painel-adicionar">
        <h2 class="section-title">▸ Adicionar Jogo</h2>

        <div id="erro-adicionar" class="mensagem-erro oculto"></div>

        <div class="add-row">
          <input type="text" id="novo-jogo" placeholder="Nome do jogo..." />
          <button id="btn-add-fim" title="Adicionar ao final">+ FIM</button>
          <button id="btn-add-inicio" title="Adicionar ao início">+ INÍCIO</button>
        </div>
      </section>

      <section class="painel-lista">
        <h2 class="section-title">▸ Minha Lista <span id="contador-badge"></span></h2>
        <ul id="lista-jogos"></ul>
      </section>
    </main>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
